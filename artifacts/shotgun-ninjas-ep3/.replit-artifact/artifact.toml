kind = "video"
previewPath = "/shotgun-ninjas-ep3/"
title = "Shotgun Ninjas - Fracture Scan"
version = "1.0.0"
id = "artifacts/shotgun-ninjas-ep3"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/shotgun-ninjas-ep3/" ]
localPort = 20118

[services.development]
run = "pnpm --filter @workspace/shotgun-ninjas-ep3 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shotgun-ninjas-ep3", "run", "build" ]
publicDir = "artifacts/shotgun-ninjas-ep3/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20118"
BASE_PATH = "/shotgun-ninjas-ep3/"

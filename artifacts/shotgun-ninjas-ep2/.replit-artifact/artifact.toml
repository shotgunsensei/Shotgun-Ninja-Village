kind = "video"
previewPath = "/shotgun-ninjas-ep2/"
title = "Shotgun Ninjas - Forge Protocol"
version = "1.0.0"
id = "artifacts/shotgun-ninjas-ep2"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/shotgun-ninjas-ep2/" ]
localPort = 23317

[services.development]
run = "pnpm --filter @workspace/shotgun-ninjas-ep2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shotgun-ninjas-ep2", "run", "build" ]

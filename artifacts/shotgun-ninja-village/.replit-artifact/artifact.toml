kind = "web"
previewPath = "/"
title = "Shotgun Ninja Village"
version = "1.0.0"
id = "artifacts/shotgun-ninja-village"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24938

[services.development]
run = "pnpm --filter @workspace/shotgun-ninja-village run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shotgun-ninja-village", "run", "build" ]
publicDir = "artifacts/shotgun-ninja-village/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24938"
BASE_PATH = "/"
